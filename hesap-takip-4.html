<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hesap Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;
    --surface:#181b22;
    --surface-2:#20242c;
    --accent:#d4a73d;
    --accent-dim:#d4a73d33;
    --text:#eceae5;
    --text-dim:#8d93a1;
    --success:#5fa777;
    --pending:#d4883a;
    --danger:#c25450;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif; font-weight:600; letter-spacing:-0.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  #app{max-width:480px; margin:0 auto; padding:20px 16px 80px;}

  /* Top bar */
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:22px; min-height:36px;}
  .back-btn{
    background:var(--surface); border:1px solid #2a2f38; color:var(--text);
    border-radius:10px; width:36px; height:36px; display:flex; align-items:center; justify-content:center;
    font-size:18px; cursor:pointer; flex-shrink:0;
  }
  .topbar h1{font-size:19px; margin:0; flex:1;}
  .eyebrow{color:var(--text-dim); font-size:12px; text-transform:uppercase; letter-spacing:0.08em; margin:0 0 4px;}

  /* Home cards */
  .home-grid{display:flex; flex-direction:column; gap:14px; margin-top:10px;}
  .home-card{
    background:linear-gradient(145deg, var(--surface), var(--surface-2));
    border:1px solid #2a2f38; border-radius:18px; padding:22px 20px;
    cursor:pointer; position:relative; overflow:hidden;
    transition:transform .15s ease, border-color .15s ease;
  }
  .home-card:active{transform:scale(0.98);}
  .home-card .tag{font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:0.1em; font-weight:600;}
  .home-card h2{font-size:21px; margin:6px 0 4px;}
  .home-card p{margin:0; color:var(--text-dim); font-size:13px;}
  .home-card .count{
    position:absolute; right:18px; top:18px; font-family:'Space Grotesk';
    font-size:28px; font-weight:700; color:#ffffff10;
  }
  .home-card.stock{border-color:#3a3320;}
  .home-card.stock .tag{color:var(--success);}
  .backup-row{display:flex; gap:10px; margin-top:18px;}
  .btn-mini{
    flex:1; background:var(--surface); border:1px solid #2a2f38; color:var(--text-dim);
    border-radius:10px; padding:10px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Inter';
  }

  /* Tabs */
  .tabs{display:flex; gap:8px; margin-bottom:16px; background:var(--surface); padding:4px; border-radius:12px; border:1px solid #2a2f38;}
  .tab{flex:1; text-align:center; padding:9px 6px; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text-dim); transition:.15s;}
  .tab.active{background:var(--accent); color:#1a1305;}

  /* Folder cards (signature element) */
  .folder-list{display:flex; flex-direction:column; gap:10px;}
  .folder{
    position:relative; background:var(--surface); border:1px solid #2a2f38;
    border-radius:0 12px 12px 12px; padding:14px 14px 14px 16px;
    cursor:pointer; display:flex; align-items:center; gap:12px;
  }
  .folder::before{
    content:''; position:absolute; top:-8px; left:0; width:46px; height:8px;
    background:var(--surface); border:1px solid #2a2f38; border-bottom:none;
    border-radius:6px 6px 0 0;
  }
  .folder .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .folder .dot.onay{background:var(--success);}
  .folder .dot.islem{background:var(--pending);}
  .folder .info{flex:1; min-width:0;}
  .folder .info h3{margin:0; font-size:15px; font-weight:600;}
  .folder .info .sub{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .folder .chev{color:var(--text-dim); font-size:18px;}
  .empty{
    text-align:center; padding:50px 20px; color:var(--text-dim);
  }
  .empty .glyph{font-size:32px; display:block; margin-bottom:10px; opacity:.5;}

  /* Country grid */
  .country-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .country-card{
    background:var(--surface); border:1px solid #2a2f38; border-radius:14px;
    padding:18px 14px; cursor:pointer; text-align:left;
  }
  .country-card .flag{font-size:22px; display:block; margin-bottom:8px;}
  .country-card h3{margin:0; font-size:15px;}
  .country-card .n{font-size:12px; color:var(--accent); font-weight:600; margin-top:4px; font-family:'Space Grotesk';}

  /* FAB */
  .fab{
    position:fixed; bottom:24px; right:50%; transform:translateX(228px);
    width:54px; height:54px; border-radius:50%; background:var(--accent);
    color:#1a1305; font-size:26px; border:none; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px #00000060; cursor:pointer; z-index:30;
  }
  @media (max-width:520px){ .fab{ right:24px; transform:none; } }

  /* Modal */
  .overlay{
    position:fixed; inset:0; background:#000000aa; display:flex; align-items:flex-end;
    justify-content:center; z-index:50; opacity:0; pointer-events:none; transition:.18s;
  }
  .overlay.open{opacity:1; pointer-events:all;}
  .sheet{
    background:var(--surface-2); width:100%; max-width:480px; border-radius:20px 20px 0 0;
    padding:20px 18px 28px; max-height:85vh; overflow-y:auto;
    transform:translateY(20px); transition:.18s;
  }
  .overlay.open .sheet{transform:translateY(0);}
  .sheet h2{margin:0 0 16px; font-size:18px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em;}
  .field input, .field textarea, .field select{
    width:100%; background:var(--surface); border:1px solid #2a2f38; color:var(--text);
    border-radius:10px; padding:11px 12px; font-size:14px; font-family:'JetBrains Mono',monospace;
  }
  .field textarea{font-family:'Inter'; resize:vertical; min-height:54px;}
  .field textarea.note-area{min-height:160px;}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .btn{
    width:100%; padding:13px; border-radius:11px; border:none; font-size:14px; font-weight:600;
    cursor:pointer; font-family:'Inter';
  }
  .btn-primary{background:var(--accent); color:#1a1305; margin-top:6px;}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid var(--danger); margin-top:8px;}
  .btn-ghost{background:transparent; color:var(--text-dim); border:1px solid #2a2f38; margin-top:8px;}
  .status-toggle{display:flex; gap:8px; margin-top:4px;}
  .status-toggle button{
    flex:1; padding:10px; border-radius:10px; border:1px solid #2a2f38; background:var(--surface);
    color:var(--text-dim); font-size:13px; font-weight:600; cursor:pointer;
  }
  .status-toggle button.active.onay{background:var(--success); color:#0b1a10; border-color:var(--success);}
  .status-toggle button.active.islem{background:var(--pending); color:#1f1206; border-color:var(--pending);}
  .copy-hint{font-size:10px; color:var(--text-dim); margin-top:3px;}
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:#fff; color:#0f1115; padding:9px 16px; border-radius:30px; font-size:13px;
    font-weight:600; opacity:0; transition:.2s; z-index:60; pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const COUNTRIES = [
  {key:'ukrayna', label:'Ukrayna', flag:'🇺🇦'},
  {key:'hollanda', label:'Hollanda', flag:'🇳🇱'},
  {key:'uk', label:'Birleşik Krallık', flag:'🇬🇧'},
  {key:'diger', label:'Diğer', flag:'🌐'}
];

let state = {
  view: 'home',          // home | pending | stock | stock-country
  pendingTab: 'onay',    // onay | islem
  stockCountry: null,
  modal: null,           // {mode:'add'|'edit', context:'pending'|'stock', data:{...}}
};

let pendingAccounts = [];
let stockAccounts = [];
let loaded = false;

function loadData(){
  try{
    const p = localStorage.getItem('hesap-takip-pending');
    pendingAccounts = p ? JSON.parse(p) : [];
  }catch(e){ pendingAccounts = []; }
  try{
    const s = localStorage.getItem('hesap-takip-stock');
    stockAccounts = s ? JSON.parse(s) : [];
  }catch(e){ stockAccounts = []; }
  loaded = true;
  render();
}

function savePending(){
  try{ localStorage.setItem('hesap-takip-pending', JSON.stringify(pendingAccounts)); }
  catch(e){ showToast('Kaydetme hatası'); }
}
function saveStock(){
  try{ localStorage.setItem('hesap-takip-stock', JSON.stringify(stockAccounts)); }
  catch(e){ showToast('Kaydetme hatası'); }
}

function exportBackup(){
  const payload = {pending: pendingAccounts, stock: stockAccounts, exportedAt: new Date().toISOString()};
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `hesap-takip-yedek-${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Yedek indirildi');
}

function triggerImport(){ document.getElementById('import-input').click(); }

function importBackup(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const payload = JSON.parse(e.target.result);
      if(Array.isArray(payload.pending)) pendingAccounts = payload.pending;
      if(Array.isArray(payload.stock)) stockAccounts = payload.stock;
      savePending(); saveStock();
      showToast('Yedek geri yüklendi');
      render();
    }catch(err){ showToast('Dosya okunamadı'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1400);
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function go(view, extra={}){
  state.view = view;
  Object.assign(state, extra);
  render();
}

function openAddModal(context){
  state.modal = {
    mode:'add', context,
    data: context === 'pending'
      ? {id:uid(), title:'', note:''}
      : {id:uid(), title:'', username:'', password:'', mail:'', mailPassword:'', phone:'', note:'', country: state.stockCountry}
  };
  render();
}
function openEditModal(context, item){
  state.modal = {mode:'edit', context, data:{...item}};
  render();
}
function closeModal(){
  persistModalData(true);
  state.modal = null;
  render();
}

function persistModalData(silent){
  const m = state.modal;
  if(!m) return;
  const d = m.data;
  if(!d.title || !d.title.trim()) return;
  if(m.context === 'pending'){
    const i = pendingAccounts.findIndex(a=>a.id===d.id);
    if(i === -1){ pendingAccounts.unshift(d); } else { pendingAccounts[i] = d; }
    m.mode = 'edit';
    savePending();
  } else {
    const i = stockAccounts.findIndex(a=>a.id===d.id);
    if(i === -1){ stockAccounts.unshift(d); } else { stockAccounts[i] = d; }
    m.mode = 'edit';
    saveStock();
  }
  if(!silent) showToast('Kaydedildi');
}

let autosaveTimer = null;
function autosave(){
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(()=>persistModalData(true), 600);
}

function saveModal(){
  clearTimeout(autosaveTimer);
  const d = state.modal.data;
  if(!d.title || !d.title.trim()){ showToast('Başlık gerekli'); return; }
  persistModalData(false);
  state.modal = null;
  render();
}

function deleteModalItem(){
  const m = state.modal;
  if(m.context === 'pending'){
    pendingAccounts = pendingAccounts.filter(a=>a.id!==m.data.id);
    savePending();
  } else {
    stockAccounts = stockAccounts.filter(a=>a.id!==m.data.id);
    saveStock();
  }
  state.modal = null;
  render();
}

function copyVal(val){
  if(!val) return;
  navigator.clipboard?.writeText(val).then(()=>showToast('Kopyalandı')).catch(()=>{});
}

function esc(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  const app = document.getElementById('app');
  if(!loaded){ app.innerHTML = `<div class="empty">Yükleniyor…</div>`; return; }

  let html = '';

  if(state.view === 'home'){
    const pendingCount = pendingAccounts.length;
    const stockCount = stockAccounts.length;
    html += `
      <div class="topbar"><h1>Hesap Takip</h1></div>
      <div class="home-grid">
        <div class="home-card" onclick="go('pending')">
          <div class="count">${pendingCount}</div>
          <div class="tag">Akış</div>
          <h2>Bekleyen Hesaplar</h2>
          <p>Başlık ve not şeklinde tuttuğun hesap kayıtları</p>
        </div>
        <div class="home-card stock" onclick="go('stock')">
          <div class="count">${stockCount}</div>
          <div class="tag">Envanter</div>
          <h2>Mevcut Stok</h2>
          <p>Ülkelere göre ayrılmış hazır hesap stoğu</p>
        </div>
      </div>
      <div class="backup-row">
        <button class="btn-mini" onclick="exportBackup()">⤓ Yedek Al</button>
        <button class="btn-mini" onclick="triggerImport()">⤒ Yedek Yükle</button>
      </div>
      <input type="file" id="import-input" accept="application/json" style="display:none" onchange="importBackup(this)">`;
  }

  else if(state.view === 'pending'){
    html += `
      <div class="topbar">
        <button class="back-btn" onclick="go('home')">‹</button>
        <h1>Bekleyen Hesaplar</h1>
      </div>
      <div class="folder-list">`;
    if(pendingAccounts.length === 0){
      html += `<div class="empty"><span class="glyph">📁</span>Bu listede henüz hesap yok</div>`;
    } else {
      pendingAccounts.forEach(a=>{
        html += `
          <div class="folder" onclick='openEditModal("pending", ${JSON.stringify(a).replace(/'/g,"&#39;")})'>
            <div class="dot onay"></div>
            <div class="info">
              <h3>${esc(a.title)}</h3>
              <div class="sub">${esc((a.note||'').slice(0,40)) || 'not yok'}</div>
            </div>
            <div class="chev">›</div>
          </div>`;
      });
    }
    html += `</div><button class="fab" onclick="openAddModal('pending')">+</button>`;
  }

  else if(state.view === 'stock'){
    html += `
      <div class="topbar">
        <button class="back-btn" onclick="go('home')">‹</button>
        <h1>Mevcut Stok</h1>
      </div>
      <div class="country-grid">`;
    COUNTRIES.forEach(c=>{
      const n = stockAccounts.filter(a=>a.country===c.key).length;
      html += `
        <div class="country-card" onclick="go('stock-country',{stockCountry:'${c.key}'})">
          <span class="flag">${c.flag}</span>
          <h3>${c.label}</h3>
          <div class="n">${n} hesap</div>
        </div>`;
    });
    html += `</div>`;
  }

  else if(state.view === 'stock-country'){
    const c = COUNTRIES.find(x=>x.key===state.stockCountry);
    const list = stockAccounts.filter(a=>a.country===state.stockCountry);
    html += `
      <div class="topbar">
        <button class="back-btn" onclick="go('stock')">‹</button>
        <h1>${c.flag} ${c.label}</h1>
      </div>
      <div class="folder-list">`;
    if(list.length === 0){
      html += `<div class="empty"><span class="glyph">📦</span>Bu ülkede henüz stok yok</div>`;
    } else {
      list.forEach(a=>{
        html += `
          <div class="folder" onclick='openEditModal("stock", ${JSON.stringify(a).replace(/'/g,"&#39;")})'>
            <div class="dot onay"></div>
            <div class="info">
              <h3>${esc(a.title)}</h3>
              <div class="sub mono">${esc(a.username || 'kullanıcı adı yok')}</div>
            </div>
            <div class="chev">›</div>
          </div>`;
      });
    }
    html += `</div><button class="fab" onclick="openAddModal('stock')">+</button>`;
  }

  // Modal
  if(state.modal){
    const m = state.modal;
    const d = m.data;
    html += `
      <div class="overlay open" onclick="if(event.target===this) closeModal()">
        <div class="sheet">
          <h2>${m.mode==='add' ? (m.context==='pending'?'Yeni Bekleyen Hesap':'Yeni Stok Hesabı') : 'Hesap Detayı'}</h2>

          <div class="field">
            <label>Başlık</label>
            <input id="f-title" value="${esc(d.title)}" placeholder="${m.context==='pending' ? 'örn: Hollanda' : 'örn: IG-0234'}" oninput="state.modal.data.title=this.value; autosave()">
          </div>

          ${m.context==='pending' ? `
          <div class="field">
            <label>Not</label>
            <textarea class="note-area" oninput="state.modal.data.note=this.value; autosave()" placeholder="Buraya istediğin her şeyi yazabilirsin">${esc(d.note)}</textarea>
          </div>
          ` : `
          <div class="field">
            <label>Ülke</label>
            <select onchange="state.modal.data.country=this.value; autosave()">
              ${COUNTRIES.map(c=>`<option value="${c.key}" ${d.country===c.key?'selected':''}>${c.flag} ${c.label}</option>`).join('')}
            </select>
          </div>

          <div class="row2">
            <div class="field">
              <label>Kullanıcı Adı</label>
              <input value="${esc(d.username)}" oninput="state.modal.data.username=this.value; autosave()" onclick="copyVal(this.value)">
            </div>
            <div class="field">
              <label>Şifre</label>
              <input value="${esc(d.password)}" oninput="state.modal.data.password=this.value; autosave()" onclick="copyVal(this.value)">
            </div>
          </div>

          <div class="row2">
            <div class="field">
              <label>Mail</label>
              <input value="${esc(d.mail)}" oninput="state.modal.data.mail=this.value; autosave()" onclick="copyVal(this.value)">
            </div>
            <div class="field">
              <label>Mail Şifre</label>
              <input value="${esc(d.mailPassword)}" oninput="state.modal.data.mailPassword=this.value; autosave()" onclick="copyVal(this.value)">
            </div>
          </div>

          <div class="field">
            <label>Telefon</label>
            <input value="${esc(d.phone)}" oninput="state.modal.data.phone=this.value; autosave()" onclick="copyVal(this.value)">
          </div>

          <div class="field">
            <label>Not</label>
            <textarea oninput="state.modal.data.note=this.value; autosave()">${esc(d.note)}</textarea>
          </div>
          <div class="copy-hint">İpucu: bir alana dokunmak değerini kopyalar</div>
          `}

          <button class="btn btn-primary" onclick="saveModal()">Kaydet</button>
          ${m.mode==='edit' ? `<button class="btn btn-danger" onclick="deleteModalItem()">Sil</button>` : ''}
          <button class="btn btn-ghost" onclick="closeModal()">Kapat</button>
        </div>
      </div>`;
  }

  app.innerHTML = html;
}

loadData();
</script>
</body>
</html>
